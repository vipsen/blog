name: Deploy to GAS

on:
  push:
    branches:
      - main # ご自身の運用ブランチに合わせてください
    paths:
      - 'gas/**' # gasディレクトリ内に変更があったときのみ実行

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Generate .clasprc.json
        run: echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json

      - name: Push to GAS
        run: clasp push -f
        working-directory: ./gas
